name: Release SINproxy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-bump:
    name: Auto-Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes & Bump
        id: check
        run: |
          # 1. Get current version
          VERSION=$(grep -oP 'version = "\K[\d\.]+' pyproject.toml)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          echo "Current Version: $VERSION"
          echo "Last Tag: $LAST_TAG"
          
          # 2. Check for changes in core directories
          if git diff --quiet $LAST_TAG HEAD -- sinproxy/ sinproxy-android/; then
            echo "No core changes detected since $LAST_TAG. Skipping bump."
            echo "bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 3. Increment patch version
          BASE=$(echo $VERSION | cut -d. -f1-2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_VERSION="$BASE.$((PATCH + 1))"
          echo "New Version: $NEW_VERSION"
          
          # 4. Update files
          sed -i "s/version = \"$VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
          sed -i "s/version '$VERSION'/version '$NEW_VERSION'/" sinproxy-android/build.gradle
          
          # 5. Commit & Tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml sinproxy-android/build.gradle
          git commit -m "chore: release v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push origin main --tags
          
          echo "bumped=true" >> $GITHUB_OUTPUT

  python-build:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build
        run: pip install build
      - name: Build wheel
        run: python -m build
      - name: Upload Python Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinproxy-python-wheel
          path: dist/*.whl

  android-build:
    name: Build Android AAR
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build AAR
        run: cd sinproxy-android && gradle assembleRelease || gradle build
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinproxy-android-aar
          path: sinproxy-android/build/outputs/aar/*.aar

  desktop-build:
    name: Build Desktop Artifacts (JAR & EXE)
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build ShadowJar (Linux/Generic)
        run: |
          cd sinproxy-android
          gradle shadowJar
      - name: Build Windows EXE (jpackage)
        shell: pwsh
        run: |
          $GRADLE_FILE = "sinproxy-android/build.gradle"
          $VERSION = (Get-Content $GRADLE_FILE | Select-String "version '([\d\.]+)'").Matches.Groups[1].Value
          jpackage --input sinproxy-android/build/libs --name SINproxy --main-jar sinproxy-desktop-all.jar --main-class com.sinproxy.android.desktop.SINDesktopApp --type exe --app-version $VERSION --win-dir-chooser --win-shortcut --win-menu
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sinproxy-desktop
          path: |
            sinproxy-android/build/libs/*-all.jar
            SINproxy*.exe

  create-release:
    name: Create GitHub Release
    needs: [python-build, android-build, desktop-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display structure of downloaded artifacts
        run: ls -R artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sinproxy-python-wheel/*.whl
            artifacts/sinproxy-android-aar/*.aar
            artifacts/sinproxy-desktop/*-all.jar
            artifacts/sinproxy-desktop/*.exe
          generate_release_notes: true

name: Release SINproxy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  initialize:
    name: Initialize & Check
    runs-on: ubuntu-latest
    outputs:
      run_build: ${{ steps.prep.outputs.run_build }}
      version: ${{ steps.prep.outputs.version }}
      is_auto: ${{ steps.prep.outputs.is_auto }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare Version and Changes
        id: prep
        run: |
          # 1. Detect if it's a tag push or main branch push
          IS_TAG=false
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            IS_TAG=true
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/v//')
            echo "Tag detected: $VERSION"
            echo "run_build=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_auto=false" >> $GITHUB_OUTPUT
          else
            # 2. Main branch push - Check for changes
            CURRENT_VERSION=$(grep -oP 'version = "\K[\d\.]+' pyproject.toml)
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            
            if git diff --quiet $LAST_TAG HEAD -- sinproxy/ sinproxy-android/ sinproxy-desktop/; then
              echo "No core changes detected since $LAST_TAG."
              echo "run_build=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            # 3. Auto-bump patch
            BASE=$(echo $CURRENT_VERSION | cut -d. -f1-2)
            PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
            NEW_VERSION="$BASE.$((PATCH + 1))"
            echo "Auto-bumping to $NEW_VERSION"
            
            # 4. Update files locally
            sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
            sed -i "s/version = '$CURRENT_VERSION'/version = '$NEW_VERSION'/" sinproxy-desktop/build.gradle
            sed -i "s/version = '$CURRENT_VERSION'/version = '$NEW_VERSION'/" sinproxy-android/build.gradle
            
            echo "run_build=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "is_auto=true" >> $GITHUB_OUTPUT
          fi
      - name: Upload Workspace
        if: steps.prep.outputs.run_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: project-workspace
          path: .
          include-hidden-files: true

  python-build:
    name: Build Python Wheel
    needs: initialize
    if: needs.initialize.outputs.run_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: project-workspace
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build
        run: pip install build
      - name: Build wheel
        run: python -m build
      - name: Upload Python Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinproxy-python-wheel
          path: dist/*.whl

  android-build:
    name: Build Android AAR
    needs: initialize
    if: needs.initialize.outputs.run_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: project-workspace
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build AAR
        run: cd sinproxy-android && gradle assembleRelease || gradle build
      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinproxy-android-aar
          path: sinproxy-android/build/outputs/aar/*.aar

  desktop-build:
    name: Build Desktop Artifacts (JAR & EXE)
    needs: initialize
    if: needs.initialize.outputs.run_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: project-workspace
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
      - name: Build ShadowJar (Linux/Generic)
        run: |
          cd sinproxy-desktop
          gradle shadowJar
      - name: Build Windows EXE (jpackage)
        shell: pwsh
        run: |
          $VERSION = "${{ needs.initialize.outputs.version }}"
          jpackage --input sinproxy-desktop/build/libs --name SINproxy --main-jar sinproxy-desktop-all.jar --main-class com.sinproxy.android.desktop.SINDesktopApp --type exe --app-version $VERSION --win-dir-chooser --win-shortcut --win-menu
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sinproxy-desktop
          path: |
            sinproxy-desktop/build/libs/*-all.jar
            SINproxy*.exe

  publish:
    name: Finalize & Publish
    needs: [initialize, python-build, android-build, desktop-build]
    runs-on: ubuntu-latest
    if: needs.initialize.outputs.run_build == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: project-workspace
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Commit Bump (If Auto)
        if: needs.initialize.outputs.is_auto == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml sinproxy-android/build.gradle sinproxy-desktop/build.gradle
          git commit -m "chore: release v${{ needs.initialize.outputs.version }}"
          git tag v${{ needs.initialize.outputs.version }}
          git push origin main --tags
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.initialize.outputs.version }}
          files: |
            all-artifacts/sinproxy-python-wheel/*.whl
            all-artifacts/sinproxy-android-aar/*.aar
            all-artifacts/sinproxy-desktop/*-all.jar
            all-artifacts/sinproxy-desktop/*.exe
          generate_release_notes: true
